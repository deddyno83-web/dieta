<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diet Tracker Pro (Dark Edition)</title>
    <!-- Use a very modern, premium font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@500;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="ambient-background"></div>

    <div class="app-container">
        <header class="top-nav fade-in-down">
            <div class="logo">
                <i data-lucide="flame" class="icon-accent"></i>
                <h1>Diet<span class="gradient-text">Pro</span></h1>
            </div>
            <div class="upload-wrapper">
                <input type="file" id="pdf-upload" accept=".pdf" class="hidden">
                <label for="pdf-upload" class="upload-btn neon-hover">
                    <i data-lucide="upload" size="18"></i> Carica PDF
                </label>
                <div id="file-name" class="file-info hidden"></div>
            </div>
        </header>

        <main id="dashboard" class="dashboard hidden">
            <!-- Tabs container -->
            <div class="tabs-scroll-container fade-in-up" style="animation-delay: 0.1s;">
                <div id="days-tabs" class="days-tabs">
                    <!-- Tabs will be generated here -->
                </div>
            </div>

            <!-- Content Area for the selected day -->
            <div id="day-content" class="day-content-area fade-in-up" style="animation-delay: 0.2s;">
                <div class="day-header-info">
                    <h2 id="active-day-title">Lunedì</h2>
                    <div class="daily-progress">
                        <div class="progress-stats">
                            <span>Calorie tracciate</span>
                            <span class="kcal-text"><span id="consumed-kcal">0</span> / <span id="total-day-kcal">2650</span> kcal</span>
                        </div>
                        <div class="progress-bar">
                            <div class="progress-fill neon-bg" id="daily-progress-fill"></div>
                        </div>
                    </div>
                </div>

                <div id="meals-container" class="meals-grid">
                    <!-- Meals cards go here -->
                </div>
            </div>
        </main>
        
        <!-- Welcome Screen if no PDF -->
        <div id="welcome-screen" class="welcome-screen fade-in-up">
            <div class="glass-card welcome-card">
                <i data-lucide="file-text" class="huge-icon"></i>
                <h2>Inizia il tuo percorso</h2>
                <p>Carica il PDF della tua dieta e sblocca la dashboard interattiva. Seleziona giorno per giorno ogni pasto e vedi le calorie calcolate dinamicamente con un'esperienza fluida.</p>
                <label for="pdf-upload" class="upload-btn primary-btn neon-hover mt-4">
                    Carica il piano settimanale
                </label>
            </div>
        </div>
    </div>

    <!-- Templates -->
    <template id="tab-template">
        <button class="day-tab">
            <span class="tab-name"></span>
            <div class="tab-indicator"></div>
        </button>
    </template>

    <template id="meal-template">
        <div class="meal-card glass-card">
            <div class="meal-header">
                <div class="meal-title-group">
                    <h3 class="meal-name"></h3>
                    <span class="meal-kcal-badge"><i data-lucide="activity" size="14"></i> <span class="meal-kcal-val"></span> kcal</span>
                </div>
                <!-- Custom Checkbox -->
                <label class="custom-checkbox">
                    <input type="checkbox" class="meal-checkbox">
                    <span class="checkmark"></span>
                </label>
            </div>
            <div class="meal-body">
                <p class="meal-content"></p>
            </div>
        </div>
    </template>

    <!-- PDF.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script>pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';</script>
    <script src="app.js"></script>
</body>
</html>
