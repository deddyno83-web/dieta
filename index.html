<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piano Edoardo Botta</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d0d;--s1:#161616;--s2:#1f1f1f;--s3:#282828;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.13);
  --txt:#f0ede8;--txt2:#999;--txt3:#555;
  --acc:#c8f55a;--acc2:#9de03a;--adim:rgba(200,245,90,.18);
  --coral:#ff6b4a;--teal:#4af5c8;--amber:#f5c84a;
  --purple:#c084fc;--blue:#60a5fa;
}
body{background:var(--bg);color:var(--txt);font-family:'DM Sans',sans-serif;min-height:100vh;padding:0 20px 80px}
.app{max-width:960px;margin:0 auto}
header{display:flex;align-items:center;justify-content:space-between;padding:28px 0;border-bottom:1px solid var(--b1);margin-bottom:32px}
.logo-mark{font-family:'DM Serif Display',serif;font-size:26px;color:var(--acc)}
#hMeta{text-align:right}
#hName{font-size:15px;font-weight:600}
#hKcal{font-size:12px;color:var(--txt3)}
.day-nav{display:flex;gap:8px;margin-bottom:28px;overflow-x:auto;padding-bottom:10px;scrollbar-width:none}
.day-btn{flex-shrink:0;padding:8px 18px;border-radius:100px;border:1px solid var(--b2);background:var(--s1);color:var(--txt2);cursor:pointer;font-size:13px}
.day-btn.on{background:var(--acc);color:#0d0d0d;font-weight:600;border-color:var(--acc)}
.day-view{display:none}
.day-view.on{display:block;animation:fade .3s ease}
@keyframes fade{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.day-hdr{display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:24px}
.day-big{font-family:'DM Serif Display',serif;font-size:36px}
.day-big em{color:var(--acc);font-style:italic}
.kcal-badge{background:var(--adim);color:var(--acc);padding:6px 14px;border-radius:100px;font-size:13px;font-weight:600}
.meals-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.meal-card{background:var(--s1);border:1px solid var(--b1);border-radius:20px;padding:20px;position:relative}
.meal-bar{position:absolute;top:0;left:0;right:0;height:3px;border-radius:20px 20px 0 0}
.meal-tag{font-size:10px;font-weight:700;text-transform:uppercase;padding:4px 10px;border-radius:100px;display:inline-block;margin-bottom:12px}
.meal-items{list-style:none;font-size:13px;color:var(--txt2);line-height:1.6}
.meal-items li{margin-bottom:8px;padding-left:12px;position:relative}
.meal-items li::before{content:'';position:absolute;left:0;top:8px;width:4px;height:4px;background:#444;border-radius:50%}
.supps{margin-top:32px;background:var(--s1);padding:24px;border-radius:20px;border:1px solid var(--b1)}
.supp-pill{display:inline-block;background:var(--s2);padding:8px 16px;border-radius:100px;margin:4px;font-size:13px;border:1px solid var(--b2)}
.supp-pill b{color:var(--acc)}
@media(max-width:600px){.meals-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-mark">nutr. <span style="font-size:12px;color:var(--txt3);font-family:'DM Sans'">Gennaio 2026</span></div>
    <div id="hMeta"><div id="hName">Edoardo Botta</div><div id="hKcal">Target: 2600-2700 kcal</div></div>
  </header>
  <div class="day-nav" id="dayNav"></div>
  <div id="daysContainer"></div>
  <div class="supps">
    <h3 style="margin-bottom:16px;font-family:'DM Serif Display'">Integrazione Consigliata</h3>
    <div id="suppsPills"></div>
  </div>
</div>
